services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demolocker
      POSTGRES_PASSWORD: demolocker
      POSTGRES_DB: demolocker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: demolocker
      MINIO_ROOT_PASSWORD: demolocker
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://demolocker:demolocker@postgres:5432/demolocker
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: demos
      S3_ACCESS_KEY: demolocker
      S3_SECRET_KEY: demolocker
    depends_on:
      - postgres
      - minio

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
  minio-data:
